<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"َ> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KakaJi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- یہاں سے ہیڈر کا کوڈ شروع ہو رہا ہے یعنی سفید لکیر کا -->
    <header id="header">
        <!-- یہاں سے کاکا جی لوگو! کا کوڈ شروع ہو رہا ہے -->
<div class="container">
    <a href="index.html"><img src="https://i.postimg.cc/y8Jcw72z/Kaka-Ji-web-kogo.png" alt="KakaJi"></a>
    </div>
    <!-- یہاں پر کاکا جی لوگو! کا کوڈ ختم ہو رہا ہے -->
     <!-- یہاں سے نیو بار کا کوڈ شروع ہو رہا ہے -->
     <nav class="nav-elements">
         <!-- یہاں سے لینگویج باکس کا کوڈ شروع ہو رہا ہے -->
        <div id="lang-box">
            <i class="fa-solid fa-earth-europe">
            </i><span id="lang-text">English</span>
            <div id="google_translate_element"></div>
        </div>
        <!-- یہاں پر لینگویج باکس کا کوڈ ختم ہو رہا ہے -->
         <!-- یہاں سے سرچ بار کے مستطیل نما ڈبے کا کوڈ شروع ہو رہا ہے -->
        <div id="Search-container"> 
            <input type="text" placeholder="Search.....">
            <!-- یہاں پر سرچ بار کے مستطیل نما ڈبے کا کوڈ ختم ہو رہا ہے -->
             <!-- یہاں سے سرچ بار کے مستیاں نما ڈبے کے اگے جو سرچ بٹن لگا ہوا ہے اس کا کوڈ شروع ہو رہا ہے -->
            <span id="Search-btn"><button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button></span>
            </div>
             <!-- یہاں سے سرچ بار کے مستیاں نما ڈبے کے اگے جو سرچ بٹن لگا ہوا ہے اس کا کوڈ ختم ہو رہا ہے -->
              <!-- یہاں سے لوکیشن باکس کا کوڈ شروع ہو رہا ہے -->
            <div id="Location-box">
                <i class="fa-solid fa-location-dot"></i>
                <span id="Location-text-country">Country</span>
                <span id="Location-text-city">City</span>
            </div>
            <!-- یہاں پر لوکیشن باکس کا کوڈ ختم ہو رہا ہے -->
             <!-- یہاں سے ایڈ ٹو کارڈ کا کوڈ شروع ہو رہاہے -->
            <div id="add-cart">
             <button id="add-to-cart">
            <span id="cart-text">Add to cart</span>
            <i class="fa-solid fa-cart-shopping"></i>
             <span id="item-count">0</span>
            </button>
            </div>
            <!-- یہاں پر ایڈ ٹو کارڈ کا کوڈ ختم ہو رہاہے -->
            <!-- یہاں سے لاگ ان کا کوڈ شروع ہو رہاہے -->
            <div id="log-in">
             <button id="log-in-button">
              Log In
             </button>
            </div>
            <!-- یہاں پر لاگ ان کا کوڈ ختم ہو رہاہے -->

     </nav>
          <!-- یہاں پر نیو بار کا کوڈ ختم ہو رہا ہے -->
    </header>
    <!-- یہاں پر ہیڈر کا کوڈ ختم ہو رہا ہے یعنی سفید لکیر کا-->
    <script type="text/javascript" src="//[translate.google.com/translate_a/element.js?cb=googleTranslateElementInit](https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit)"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
